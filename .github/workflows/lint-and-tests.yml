name: lint and tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev librsvg2-dev

      - name: Install npm dependencies
        run: npm install

      # --- Formatting ---

      - name: Prettier check
        run: npx prettier --check src
        working-directory: packages/tmuxy-ui

      - name: Rust format check
        run: cargo fmt --check -p tmuxy-core -p tmuxy-server -p tauri-app

      # --- Linting ---

      - name: ESLint
        run: npm run lint -w tmuxy-ui

      - name: ESLint (E2E tests)
        run: npm run lint:tests

      - name: Clippy
        run: |
          mkdir -p packages/tmuxy-ui/dist
          cargo clippy -p tmuxy-core -p tmuxy-server -p tauri-app -- -D warnings

      # --- Type Check ---

      - name: TypeScript type check
        run: npx tsc --noEmit
        working-directory: packages/tmuxy-ui

  tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libevent-dev libncurses-dev bison fzf \
            libwebkit2gtk-4.1-dev libgtk-3-dev libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev librsvg2-dev \
            webkit2gtk-driver xvfb x11-utils

      # Build tmux 3.5a from source (Ubuntu apt has 3.4; control mode differs)
      - name: Install tmux 3.5a
        run: |
          curl -sL https://github.com/tmux/tmux/releases/download/3.5a/tmux-3.5a.tar.gz | tar xz
          cd tmux-3.5a && ./configure && make -j$(nproc) && sudo make install
          cd .. && rm -rf tmux-3.5a
          tmux -V

      - name: Install tauri-driver
        run: cargo install tauri-driver

      - name: Install npm dependencies
        run: npm install

      - name: Install Chromium
        run: npx playwright install chromium --with-deps

      # --- Unit Tests ---

      - name: Vitest
        run: npm test -- --run

      # --- Build ---

      - name: Build frontend
        run: npm run build -w tmuxy-ui

      - name: Build server (release)
        run: cargo build --release -p tmuxy-server

      # --- E2E Tests ---

      - name: Start server
        run: |
          ./target/release/tmuxy-server 2>/tmp/tmuxy-server.log &
          node -e "
            const start = Date.now();
            const timeout = 30000;
            const check = async () => {
              while (Date.now() - start < timeout) {
                try {
                  const res = await fetch('http://localhost:9000');
                  if (res.ok) { process.exit(0); }
                } catch {}
                await new Promise(r => setTimeout(r, 500));
              }
              process.exit(1);
            };
            check();
          "

      - name: "Snapshot: UI ↔ tmux state"
        run: npx jest --forceExit tests/snapshots/

      # Clean up tmux state between test suites.
      # The snapshot test's session/monitor may still be alive (2s grace period).
      # Kill the tmux server to ensure a clean state for E2E tests.
      - name: Reset tmux between suites
        run: tmux kill-server 2>/dev/null; sleep 3
        if: always()

      - name: "E2E: 1 – Input & Interaction"
        run: npx jest --forceExit tests/1-input-interaction.test.js

      - name: "E2E: 2 – Layout & Navigation"
        run: npx jest --forceExit tests/2-layout-navigation.test.js

      - name: "E2E: 3 – Rendering & Protocols"
        run: npx jest --forceExit tests/3-rendering-protocols.test.js

      - name: "E2E: 4 – Session & Connectivity"
        run: npx jest --forceExit tests/4-session-connectivity.test.js

      - name: "E2E: 5 – Stress & Stability"
        run: npx jest --forceExit tests/5-stress-stability.test.js

      - name: Server logs (debug)
        if: failure()
        run: cat /tmp/tmuxy-server.log | tail -2000

      # --- Tauri Tests ---

      - name: Build Tauri app (debug)
        run: npx tauri build --debug --no-bundle
        working-directory: packages/tauri-app

      - name: "Tauri E2E tests"
        run: npm run test:tauri
