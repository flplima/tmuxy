name: lint and tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: swatinem/rust-cache@v2

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev librsvg2-dev

      - name: Install npm dependencies
        run: npm ci

      # --- Formatting ---

      - name: Prettier check
        run: npx prettier --check src
        working-directory: packages/tmuxy-ui

      - name: Rust format check
        run: cargo fmt --check -p tmuxy-core -p tmuxy-server -p tauri-app

      # --- Linting ---

      - name: ESLint
        run: npm run lint -w tmuxy-ui

      - name: ESLint (E2E tests)
        run: npm run lint:tests

      - name: Clippy
        run: |
          mkdir -p packages/tmuxy-ui/dist
          cargo clippy -p tmuxy-core -p tmuxy-server -p tauri-app -- -D warnings

      # --- Type Check ---

      - name: TypeScript type check
        run: npx tsc --noEmit
        working-directory: packages/tmuxy-ui

  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Vitest
        run: npm test -- --run

  # E2E + snapshot suites run in parallel — one matrix entry per suite,
  # one runner per suite. Previously these were serial inside a single
  # job (~10 min total); matrix puts walltime at max-of-suites.
  e2e:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite:
          - { name: snapshots, path: 'tests/snapshots/' }
          - { name: '1-input', path: 'tests/1-input-interaction.test.js' }
          - { name: '2-layout', path: 'tests/2-layout-navigation.test.js' }
          - { name: '3-rendering', path: 'tests/3-rendering-protocols.test.js' }
          - { name: '4-session', path: 'tests/4-session-connectivity.test.js' }
          - { name: '5-stress', path: 'tests/5-stress-stability.test.js' }
    name: e2e (${{ matrix.suite.name }})

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libevent-dev libncurses-dev bison fzf \
            libwebkit2gtk-4.1-dev libgtk-3-dev libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev librsvg2-dev

      # Cache tmux 3.5a binary so we don't recompile from source every run.
      # Build cost is ~30-60s; cache restore is ~2s.
      - name: Cache tmux 3.5a
        id: tmux-cache
        uses: actions/cache@v5
        with:
          path: |
            /usr/local/bin/tmux
            /usr/local/share/tmux
          key: ${{ runner.os }}-tmux-3.5a-v1

      - name: Build tmux 3.5a (cache miss)
        if: steps.tmux-cache.outputs.cache-hit != 'true'
        run: |
          curl -sL https://github.com/tmux/tmux/releases/download/3.5a/tmux-3.5a.tar.gz | tar xz
          cd tmux-3.5a && ./configure && make -j$(nproc) && sudo make install
          cd .. && rm -rf tmux-3.5a

      - name: Confirm tmux version
        run: tmux -V

      - name: Install npm dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install chromium --with-deps

      - name: Build frontend
        run: npm run build -w tmuxy-ui

      - name: Build server (release)
        run: cargo build --release -p tmuxy-server

      - name: Start server
        run: |
          ./target/release/tmuxy-server 2>/tmp/tmuxy-server.log &
          node -e "
            const start = Date.now();
            const timeout = 30000;
            const check = async () => {
              while (Date.now() - start < timeout) {
                try {
                  const res = await fetch('http://localhost:9000');
                  if (res.ok) { process.exit(0); }
                } catch {}
                await new Promise(r => setTimeout(r, 500));
              }
              process.exit(1);
            };
            check();
          "

      - name: Run ${{ matrix.suite.name }}
        run: npx jest --forceExit ${{ matrix.suite.path }}

      - name: Server logs (debug)
        if: failure()
        run: cat /tmp/tmuxy-server.log | tail -2000

  # Tauri E2E runs as its own parallel job. Previously chained after the
  # E2E suite, adding ~3 min to the critical path. Still builds a debug
  # Tauri binary (different profile from build-app's release), but no
  # longer sits on the longest job.
  tauri-e2e:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libevent-dev libncurses-dev bison \
            libwebkit2gtk-4.1-dev libgtk-3-dev libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev librsvg2-dev \
            webkit2gtk-driver xvfb x11-utils

      # Match the `e2e` job's tmux version. Ubuntu's apt ships tmux 3.4, which
      # has a race where the initial auto-adopt of `@tmuxy-window-type=tab`
      # gets clobbered by an in-flight list-windows response under the load
      # the new Ctx/Tower Tauri path puts on the CC stream at startup. 3.5a
      # serializes that path correctly and matches the version users see.
      - name: Cache tmux 3.5a
        id: tmux-cache
        uses: actions/cache@v5
        with:
          path: |
            /usr/local/bin/tmux
            /usr/local/share/tmux
          key: ${{ runner.os }}-tmux-3.5a-v1

      - name: Build tmux 3.5a (cache miss)
        if: steps.tmux-cache.outputs.cache-hit != 'true'
        run: |
          curl -sL https://github.com/tmux/tmux/releases/download/3.5a/tmux-3.5a.tar.gz | tar xz
          cd tmux-3.5a && ./configure && make -j$(nproc) && sudo make install
          cd .. && rm -rf tmux-3.5a

      - name: Confirm tmux version
        run: tmux -V

      - name: Install tauri-driver
        run: cargo install tauri-driver

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app (debug)
        run: npx tauri build --debug --no-bundle
        working-directory: packages/tauri-app

      - name: Tauri E2E tests
        run: npm run test:tauri
