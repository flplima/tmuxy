name: Build App

on:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            os: ubuntu-22.04
            rust-targets: ''
            tauri-args: ''
            binary: target/release/tmuxy
          - platform: macos
            os: macos-latest
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            tauri-args: '--target universal-apple-darwin'
            binary: target/universal-apple-darwin/release/tmuxy
          - platform: windows
            os: windows-latest
            rust-targets: ''
            tauri-args: ''
            binary: target/release/tmuxy.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: swatinem/rust-cache@v2

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev librsvg2-dev

      - run: npm install

      # --- Build ---

      - name: Build Tauri app
        run: npx tauri build ${{ matrix.tauri-args }}
        working-directory: packages/tauri-app

      # --- Smoke Test (Linux + macOS) ---
      # Both platforms use WebdriverIO for full GUI verification: launch app,
      # type a command, verify output appears in the terminal UI.
      # Linux: tauri-driver (WebKitGTK driver) + Xvfb
      # macOS: tauri-webdriver (embeds WebDriver in the app via plugin)

      - name: Install smoke test deps (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get install -y --no-install-recommends \
            tmux webkit2gtk-driver xvfb x11-utils
          cargo install tauri-driver

      - name: Install smoke test deps (macOS)
        if: matrix.platform == 'macos'
        run: |
          brew install tmux
          cargo install tauri-webdriver

      - name: Build smoke test binary (macOS)
        if: matrix.platform == 'macos'
        run: npx tauri build --debug --no-bundle --features webdriver
        working-directory: packages/tauri-app

      - name: Run smoke test (Linux)
        if: matrix.platform == 'linux'
        run: |
          # Start virtual display
          Xvfb :99 -screen 0 1280x720x24 -ac -nolisten tcp &
          XVFB_PID=$!
          export DISPLAY=:99

          # Wait for display
          for i in $(seq 1 20); do
            xdpyinfo -display :99 >/dev/null 2>&1 && break
            sleep 0.25
          done

          # Start tauri-driver
          tauri-driver --port 4444 &
          DRIVER_PID=$!
          sleep 2

          # Run smoke test
          node tests/smoke/smoke-test.js "${{ matrix.binary }}"
          RESULT=$?

          # Cleanup
          kill $DRIVER_PID 2>/dev/null || true
          kill $XVFB_PID 2>/dev/null || true

          exit $RESULT

      - name: Run smoke test (macOS)
        if: matrix.platform == 'macos'
        run: |
          # Start tauri-webdriver (proxies W3C WebDriver to the embedded plugin)
          tauri-webdriver --port 4444 &
          DRIVER_PID=$!
          sleep 2

          # Run smoke test using the debug binary (has webdriver plugin)
          node tests/smoke/smoke-test.js target/debug/tmuxy
          RESULT=$?

          # Cleanup
          kill $DRIVER_PID 2>/dev/null || true

          exit $RESULT

      # --- Collect Artifacts ---

      # --- Collect & Upload Artifacts ---
      # Linux uploads .deb and .AppImage as separate artifacts

      - name: Upload AppImage
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v6
        with:
          name: tmuxy-linux-appimage
          path: target/release/bundle/appimage/*.AppImage
          if-no-files-found: warn

      - name: Upload .deb
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v6
        with:
          name: tmuxy-linux-deb
          path: target/release/bundle/deb/*.deb
          if-no-files-found: warn

      - name: Upload .dmg
        if: matrix.platform == 'macos'
        uses: actions/upload-artifact@v6
        with:
          name: tmuxy-macos-dmg
          path: target/universal-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: warn

      - name: Upload .msi
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v6
        with:
          name: tmuxy-windows-msi
          path: target/release/bundle/msi/*.msi
          if-no-files-found: warn

      - name: Upload .exe
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v6
        with:
          name: tmuxy-windows-exe
          path: target/release/bundle/nsis/*.exe
          if-no-files-found: warn

  # --- Release (only on tag push, after all builds + smoke tests pass) ---

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v6
        with:
          path: all-artifacts

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"

          # Flatten all platform artifacts into one directory
          mkdir -p release-assets
          find all-artifacts -type f \( -name '*.AppImage' -o -name '*.deb' -o -name '*.dmg' -o -name '*.msi' -o -name '*.exe' \) \
            -exec cp {} release-assets/ \;

          ls -lh release-assets/

          # Create release with all assets
          gh release create "$TAG" release-assets/* \
            --title "tmuxy $TAG" \
            --notes "See the assets below to download and install tmuxy for your platform." \
            --latest
