name: Build App

on:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            os: ubuntu-22.04
            rust-targets: ''
            args: ''
          - platform: macos
            os: macos-latest
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            args: '--target universal-apple-darwin'
          - platform: windows
            os: windows-latest
            rust-targets: ''
            args: ''

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: swatinem/rust-cache@v2

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev librsvg2-dev

      - run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: packages/tauri-app
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && format('tmuxy {0}', github.ref_name) || '' }}
          releaseBody: 'See the assets below to download and install tmuxy for your platform.'
          releaseDraft: false
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
          args: ${{ matrix.args }}

      - name: Upload Linux AppImage
        if: ${{ !startsWith(github.ref, 'refs/tags/') && matrix.platform == 'linux' }}
        uses: actions/upload-artifact@v4
        with:
          name: tmuxy-linux-appimage
          path: target/release/bundle/appimage/*.AppImage
          if-no-files-found: warn

      - name: Upload Linux .deb
        if: ${{ !startsWith(github.ref, 'refs/tags/') && matrix.platform == 'linux' }}
        uses: actions/upload-artifact@v4
        with:
          name: tmuxy-linux-deb
          path: target/release/bundle/deb/*.deb
          if-no-files-found: warn

      - name: Upload macOS .dmg
        if: ${{ !startsWith(github.ref, 'refs/tags/') && matrix.platform == 'macos' }}
        uses: actions/upload-artifact@v4
        with:
          name: tmuxy-macos
          path: target/universal-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: warn

      - name: Upload Windows .msi
        if: ${{ !startsWith(github.ref, 'refs/tags/') && matrix.platform == 'windows' }}
        uses: actions/upload-artifact@v4
        with:
          name: tmuxy-windows
          path: target/release/bundle/msi/*.msi
          if-no-files-found: warn
