name: Build App

on:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            os: ubuntu-22.04
            rust-targets: ''
            tauri-args: ''
            binary: target/release/tmuxy
          - platform: macos
            os: macos-latest
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            tauri-args: '--target universal-apple-darwin'
            binary: target/universal-apple-darwin/release/tmuxy
          - platform: windows
            os: windows-latest
            rust-targets: ''
            tauri-args: ''
            binary: target/release/tmuxy.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: swatinem/rust-cache@v2

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev librsvg2-dev

      - run: npm install

      # --- Build ---

      - name: Build Tauri app
        run: npx tauri build ${{ matrix.tauri-args }}
        working-directory: packages/tauri-app

      # --- Smoke Test (Linux + macOS) ---
      # Linux: Full UI test via WebdriverIO → tauri-driver → WebKitWebDriver
      # macOS: tmux-based test (tauri-driver doesn't support macOS/WKWebView)

      - name: Install smoke test deps (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get install -y --no-install-recommends \
            tmux webkit2gtk-driver xvfb x11-utils
          cargo install tauri-driver

      - name: Install smoke test deps (macOS)
        if: matrix.platform == 'macos'
        run: brew install tmux

      - name: Run smoke test (Linux)
        if: matrix.platform == 'linux'
        run: |
          # Start virtual display
          Xvfb :99 -screen 0 1280x720x24 -ac -nolisten tcp &
          XVFB_PID=$!
          export DISPLAY=:99

          # Wait for display
          for i in $(seq 1 20); do
            xdpyinfo -display :99 >/dev/null 2>&1 && break
            sleep 0.25
          done

          # Start tauri-driver
          tauri-driver --port 4444 &
          DRIVER_PID=$!
          sleep 2

          # Run smoke test
          node tests/smoke/smoke-test.js "${{ matrix.binary }}"
          RESULT=$?

          # Cleanup
          kill $DRIVER_PID 2>/dev/null || true
          kill $XVFB_PID 2>/dev/null || true

          exit $RESULT

      - name: Run smoke test (macOS)
        if: matrix.platform == 'macos'
        run: node tests/smoke/smoke-test.js "${{ matrix.binary }}"

      # --- Collect Artifacts ---

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p artifacts
          case "${{ matrix.platform }}" in
            linux)
              cp target/release/bundle/appimage/*.AppImage artifacts/ 2>/dev/null || true
              cp target/release/bundle/deb/*.deb artifacts/ 2>/dev/null || true
              ;;
            macos)
              cp target/universal-apple-darwin/release/bundle/dmg/*.dmg artifacts/ 2>/dev/null || true
              ;;
            windows)
              cp target/release/bundle/msi/*.msi artifacts/ 2>/dev/null || true
              cp target/release/bundle/nsis/*.exe artifacts/ 2>/dev/null || true
              ;;
          esac
          ls -lh artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tmuxy-${{ matrix.platform }}
          path: artifacts/*
          if-no-files-found: warn

  # --- Release (only on tag push, after all builds + smoke tests pass) ---

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: all-artifacts

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"

          # Flatten all platform artifacts into one directory
          mkdir -p release-assets
          find all-artifacts -type f \( -name '*.AppImage' -o -name '*.deb' -o -name '*.dmg' -o -name '*.msi' -o -name '*.exe' \) \
            -exec cp {} release-assets/ \;

          ls -lh release-assets/

          # Create release with all assets
          gh release create "$TAG" release-assets/* \
            --title "tmuxy $TAG" \
            --notes "See the assets below to download and install tmuxy for your platform." \
            --latest
