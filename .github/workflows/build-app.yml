name: Build App

on:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            os: ubuntu-22.04
            args: ''
          - platform: macos-arm
            os: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-intel
            os: macos-latest
            args: '--target x86_64-apple-darwin'
          - platform: windows
            os: windows-latest
            args: ''

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-arm' && 'aarch64-apple-darwin' || matrix.platform == 'macos-intel' && 'x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev librsvg2-dev

      - run: npm install

      - uses: tauri-apps/tauri-action@v0
        id: tauri
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: packages/tauri-app
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && format('tmuxy {0}', github.ref_name) || '' }}
          releaseBody: 'See the assets below to download and install tmuxy for your platform.'
          releaseDraft: false
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
          args: ${{ matrix.args }}

      # Upload build artifacts for non-tagged pushes (workflow artifacts, 90-day TTL).
      # Tagged pushes upload to GitHub Releases via tauri-action above.
      - name: Upload artifacts
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: tmuxy-${{ matrix.platform }}
          path: target/release/bundle/**/*
          if-no-files-found: warn
