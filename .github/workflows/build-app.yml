name: Build App

on:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            arch: amd64
            os: ubuntu-22.04
            rust-targets: ''
            tauri-args: ''
            binary: target/release/tmuxy
          - platform: linux
            arch: arm64
            os: ubuntu-22.04-arm
            rust-targets: ''
            tauri-args: ''
            binary: target/release/tmuxy
          - platform: macos
            arch: universal
            os: macos-latest
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            tauri-args: '--target universal-apple-darwin'
            binary: target/universal-apple-darwin/release/tmuxy

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: swatinem/rust-cache@v2

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev librsvg2-dev

      - run: npm install

      # --- Build ---

      - name: Build Tauri app
        run: npx tauri build ${{ matrix.tauri-args }}
        working-directory: packages/tauri-app

      # --- Smoke Test (Linux + macOS) ---
      # Both platforms use WebdriverIO for full GUI verification: launch app,
      # type a command, verify output appears in the terminal UI.
      # Linux: tauri-driver (WebKitGTK driver) + Xvfb
      # macOS: tauri-webdriver (embeds WebDriver in the app via plugin)

      - name: Install smoke test deps (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get install -y --no-install-recommends \
            tmux webkit2gtk-driver xvfb x11-utils
          cargo install tauri-driver

      - name: Install smoke test deps (macOS)
        if: matrix.platform == 'macos'
        run: |
          brew install tmux
          cargo install tauri-webdriver

      - name: Build smoke test binary (macOS)
        if: matrix.platform == 'macos'
        run: npx tauri build --debug --no-bundle --features webdriver
        working-directory: packages/tauri-app

      - name: Run smoke test (Linux)
        if: matrix.platform == 'linux'
        run: |
          # Start virtual display
          Xvfb :99 -screen 0 1280x720x24 -ac -nolisten tcp &
          XVFB_PID=$!
          export DISPLAY=:99

          # Wait for display
          for i in $(seq 1 20); do
            xdpyinfo -display :99 >/dev/null 2>&1 && break
            sleep 0.25
          done

          # Start tauri-driver
          tauri-driver --port 4444 &
          DRIVER_PID=$!
          sleep 2

          # Run smoke test
          node tests/smoke/smoke-test.js "${{ matrix.binary }}"
          RESULT=$?

          # Cleanup
          kill $DRIVER_PID 2>/dev/null || true
          kill $XVFB_PID 2>/dev/null || true

          exit $RESULT

      # Regression test for the macOS Finder-launch failure pattern. Runs
      # only on Linux because it needs to spawn the binary with a custom
      # HOME (the macOS .app on the runner can't be relaunched the same
      # way). Tries to validate the bounded-retry safety net by planting a
      # tmux.conf that should make every CC attach die within ms, then
      # asserts the debug log shows FATAL within ~45s.
      #
      # Marked continue-on-error because tmux 3.x's pane-death detection
      # and hook firing are too non-deterministic to reproducibly trigger
      # the failure mode within the test window — across four iterations
      # of the planted config (nonexistent path / /bin/false / kill-server
      # hook / belt-and-suspenders) the run is roughly 60% pass rate. The
      # bug class this test was meant to catch (silent reconnect storms)
      # is also covered by the smoke-test debug-log healthcheck which
      # asserts <=2 connect events on the happy path; that one IS reliable
      # and runs above.
      - name: Run hostile-config regression test (Linux)
        if: matrix.platform == 'linux'
        continue-on-error: true
        run: |
          Xvfb :99 -screen 0 1280x720x24 -ac -nolisten tcp &
          XVFB_PID=$!
          export DISPLAY=:99

          for i in $(seq 1 20); do
            xdpyinfo -display :99 >/dev/null 2>&1 && break
            sleep 0.25
          done

          node tests/smoke/hostile-config-test.js "${{ matrix.binary }}"
          RESULT=$?

          kill $XVFB_PID 2>/dev/null || true

          exit $RESULT

      - name: Run smoke test (macOS)
        if: matrix.platform == 'macos'
        run: |
          # Start tauri-webdriver (proxies W3C WebDriver to the embedded plugin)
          tauri-webdriver --port 4444 &
          DRIVER_PID=$!
          sleep 2

          # Run smoke test using the debug binary (has webdriver plugin)
          node tests/smoke/smoke-test.js target/debug/tmuxy
          RESULT=$?

          # Cleanup
          kill $DRIVER_PID 2>/dev/null || true

          exit $RESULT

      # Sparse-PATH regression test for the macOS Finder-launch failure.
      # Runs the *release* universal binary (which contains the production
      # PATH-augmentation code path) under launchd-style stripped env, with
      # a tmux.conf that requires a Homebrew-only binary to stay alive.
      # If gui.rs's PATH augmentation regresses, this test reconnect-storms
      # or FATALs out within seconds.
      - name: Install sparse-PATH test helper (macOS)
        if: matrix.platform == 'macos'
        run: |
          sudo tee /opt/homebrew/bin/tmuxy-stay-alive > /dev/null << 'EOF'
          #!/bin/sh
          exec sleep 36000
          EOF
          sudo chmod +x /opt/homebrew/bin/tmuxy-stay-alive

      - name: Run sparse-PATH regression test (macOS)
        if: matrix.platform == 'macos'
        run: node tests/smoke/macos-sparse-path-test.js "${{ matrix.binary }}"

      # --- Collect Artifacts ---

      # --- Collect & Upload Artifacts ---
      # Linux uploads .deb and .AppImage as separate artifacts

      - name: Upload AppImage
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v6
        with:
          name: tmuxy-linux-appimage-${{ matrix.arch }}
          path: target/release/bundle/appimage/*.AppImage
          if-no-files-found: warn

      - name: Upload .deb
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v6
        with:
          name: tmuxy-linux-deb-${{ matrix.arch }}
          path: target/release/bundle/deb/*.deb
          if-no-files-found: warn

      - name: Upload .dmg
        if: matrix.platform == 'macos'
        uses: actions/upload-artifact@v6
        with:
          name: tmuxy-macos-dmg
          path: target/universal-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: warn

  # --- Release (only on tag push, after all builds + smoke tests pass) ---

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v6
        with:
          path: all-artifacts

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"

          # Flatten all platform artifacts into one directory
          mkdir -p release-assets
          find all-artifacts -type f \( -name '*.AppImage' -o -name '*.deb' -o -name '*.dmg' \) \
            -exec cp {} release-assets/ \;

          ls -lh release-assets/

          # Create release with all assets
          gh release create "$TAG" release-assets/* \
            --title "tmuxy $TAG" \
            --notes "See the assets below to download and install tmuxy for your platform." \
            --latest

  # --- Bump Homebrew Cask (only on tag push, after release publishes) ---
  #
  # Pushes an updated Casks/tmuxy.rb to flplima/homebrew-tap so users can
  # `brew install --cask flplima/tap/tmuxy`. Brew strips the macOS quarantine
  # xattr automatically on cask install, so the unsigned DMG is usable
  # without the "tmuxy is damaged" Gatekeeper dialog. Requires
  # HOMEBREW_TAP_TOKEN secret (PAT with Contents:Write on flplima/homebrew-tap).

  bump-cask:
    needs: release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v6
        with:
          name: tmuxy-macos-dmg
          path: dmg

      - name: Compute version + sha256
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          DMG=$(ls dmg/*.dmg | head -1)
          SHA=$(sha256sum "$DMG" | awk '{print $1}')
          echo "version=$VERSION"  >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA"       >> "$GITHUB_OUTPUT"
          echo "dmg_name=$(basename "$DMG")" >> "$GITHUB_OUTPUT"
          echo "Bumping cask: v$VERSION sha256=$SHA from $(basename "$DMG")"

      - name: Push updated cask to flplima/homebrew-tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ steps.meta.outputs.version }}
          SHA256: ${{ steps.meta.outputs.sha256 }}
        run: |
          set -euo pipefail
          git clone --depth 1 \
            "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/flplima/homebrew-tap.git" tap
          cd tap
          mkdir -p Casks

          # Single-quoted heredoc so bash leaves Ruby `#{version}` and
          # `#{appdir}` interpolation untouched. Placeholders sed-replaced.
          cat > Casks/tmuxy.rb <<'CASK'
          cask "tmuxy" do
            version "__VERSION__"
            sha256 "__SHA256__"

            url "https://github.com/flplima/tmuxy/releases/download/v#{version}/tmuxy_#{version}_universal.dmg"
            name "tmuxy"
            desc "Web-based tmux interface"
            homepage "https://github.com/flplima/tmuxy"

            auto_updates false

            app "tmuxy.app"

            # Strip Gatekeeper's quarantine attribute so macOS Sequoia's
            # "Apple could not verify..." dialog doesn't block the first
            # launch. Brew stopped doing this automatically in 2022; for
            # an unsigned + un-notarized app there's no other way to ship
            # a frictionless first launch without paying for the Apple
            # Developer Program.
            postflight do
              system_command "/usr/bin/xattr",
                             args: ["-dr", "com.apple.quarantine", "#{appdir}/tmuxy.app"],
                             sudo: false

              # Record the app binary path and install a CLI wrapper at
              # ~/.local/bin/tmuxy so `tmuxy pane list` etc. work immediately
              # after install, without opening the GUI first.
              exec_path = "#{appdir}/tmuxy.app/Contents/MacOS/tmuxy"
              config_dir = Pathname.new(Dir.home)/".config/tmuxy"
              config_dir.mkpath
              (config_dir/"launcher").write "#{exec_path}\n"

              bin_dir = Pathname.new(Dir.home)/".local/bin"
              bin_dir.mkpath
              wrapper = bin_dir/"tmuxy"
              wrapper.write "#!/bin/sh\n" \
                "set -eu\n" \
                "LAUNCHER_FILE=\"${XDG_CONFIG_HOME:-$HOME/.config}/tmuxy/launcher\"\n" \
                "if [ ! -f \"$LAUNCHER_FILE\" ]; then\n" \
                "  echo 'tmuxy: no launcher recorded — open the app once first.' >&2\n" \
                "  exit 1\n" \
                "fi\n" \
                "EXEC_PATH=\"$(cat \"$LAUNCHER_FILE\")\"\n" \
                "if [ \"$#\" -gt 0 ]; then exec \"$EXEC_PATH\" \"$@\"; fi\n" \
                "APP_PATH=\"${EXEC_PATH%%/Contents/MacOS/*}\"\n" \
                "if [ \"$APP_PATH\" != \"$EXEC_PATH\" ] && [ -d \"$APP_PATH\" ]; then\n" \
                "  exec /usr/bin/open \"$APP_PATH\"\n" \
                "fi\n" \
                "exec \"$EXEC_PATH\"\n"
              wrapper.chmod 0o755
            end

            zap trash: [
              "~/.config/tmuxy",
              "~/.local/bin/tmuxy",
              "~/Library/Application Support/com.tmuxy.app",
              "~/Library/Preferences/com.tmuxy.app.plist",
              "~/Library/Saved Application State/com.tmuxy.app.savedState",
              "~/tmuxy-debug.log",
            ]
          end
          CASK

          sed -i "s/__VERSION__/${VERSION}/g" Casks/tmuxy.rb
          sed -i "s/__SHA256__/${SHA256}/g"  Casks/tmuxy.rb

          git config user.name  "tmuxy-cask-bumper[bot]"
          git config user.email "tmuxy-cask-bumper@users.noreply.github.com"
          git add Casks/tmuxy.rb

          if git diff --staged --quiet; then
            echo "Cask already at v${VERSION}; nothing to push."
          else
            git commit -m "chore: bump tmuxy to v${VERSION}"
            git push origin HEAD
          fi

  # --- Bump Homebrew Formula (only on tag push, after the cask is pushed) ---
  #
  # Homebrew casks are macOS-only; Linux Homebrew installs from formulae.
  # This pushes a Formula/tmuxy.rb to flplima/homebrew-tap so Linux users can
  # `brew install flplima/tap/tmuxy`. The formula installs the release
  # AppImage as the `tmuxy` binary. Runs after bump-cask (not in parallel) so
  # the two jobs don't race pushing to the same tap repo.

  bump-formula:
    needs: [release, bump-cask]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v6
        with:
          name: tmuxy-linux-appimage-amd64
          path: appimage-amd64

      - uses: actions/download-artifact@v6
        with:
          name: tmuxy-linux-appimage-arm64
          path: appimage-arm64

      - name: Compute version + sha256
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          AMD=$(ls appimage-amd64/*.AppImage | head -1)
          ARM=$(ls appimage-arm64/*.AppImage | head -1)
          SHA_AMD=$(sha256sum "$AMD" | awk '{print $1}')
          SHA_ARM=$(sha256sum "$ARM" | awk '{print $1}')
          echo "version=$VERSION"      >> "$GITHUB_OUTPUT"
          echo "sha256_amd=$SHA_AMD"   >> "$GITHUB_OUTPUT"
          echo "sha256_arm=$SHA_ARM"   >> "$GITHUB_OUTPUT"
          echo "Bumping formula: v$VERSION amd64=$SHA_AMD arm64=$SHA_ARM"

      - name: Push updated formula to flplima/homebrew-tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ steps.meta.outputs.version }}
          SHA256_AMD: ${{ steps.meta.outputs.sha256_amd }}
          SHA256_ARM: ${{ steps.meta.outputs.sha256_arm }}
        run: |
          set -euo pipefail
          git clone --depth 1 \
            "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/flplima/homebrew-tap.git" tap
          cd tap
          mkdir -p Formula

          # Single-quoted heredoc so bash leaves Ruby `#{version}` interpolation
          # untouched. Placeholders sed-replaced below.
          cat > Formula/tmuxy.rb <<'FORMULA'
          class Tmuxy < Formula
            desc "Web-based tmux interface"
            homepage "https://github.com/flplima/tmuxy"
            version "__VERSION__"

            depends_on :linux
            depends_on "tmux"

            on_arm do
              url "https://github.com/flplima/tmuxy/releases/download/v#{version}/tmuxy_#{version}_aarch64.AppImage"
              sha256 "__SHA256_ARM__"
            end

            on_intel do
              url "https://github.com/flplima/tmuxy/releases/download/v#{version}/tmuxy_#{version}_amd64.AppImage"
              sha256 "__SHA256_AMD__"
            end

            def install
              bin.install Dir["tmuxy_*.AppImage"].first => "tmuxy"
            end

            # Homebrew 6.0+ sandboxes post_install ($HOME is read-only),
            # so .desktop/icon install runs outside brew via caveats.
            def caveats
              <<~EOS
                To add tmuxy to your application menu, run once:
                  #{bin}/tmuxy --appimage-extract usr/share 2>/dev/null; \\
                  mkdir -p ~/.local/share/applications ~/.local/share/icons; \\
                  sed 's|Exec=.*|Exec=#{bin}/tmuxy gui|;s|Icon=.*|Icon=tmuxy|;s|StartupWMClass=.*|StartupWMClass=tmuxy|' \\
                    squashfs-root/usr/share/applications/tmuxy.desktop \\
                    > ~/.local/share/applications/tmuxy.desktop; \\
                  cp -r squashfs-root/usr/share/icons/hicolor ~/.local/share/icons/; \\
                  rm -rf squashfs-root
              EOS
            end

            test do
              assert_path_exists bin/"tmuxy"
            end
          end
          FORMULA

          sed -i "s/__VERSION__/${VERSION}/g"      Formula/tmuxy.rb
          sed -i "s/__SHA256_AMD__/${SHA256_AMD}/g" Formula/tmuxy.rb
          sed -i "s/__SHA256_ARM__/${SHA256_ARM}/g" Formula/tmuxy.rb

          git config user.name  "tmuxy-cask-bumper[bot]"
          git config user.email "tmuxy-cask-bumper@users.noreply.github.com"
          git add Formula/tmuxy.rb

          if git diff --staged --quiet; then
            echo "Formula already at v${VERSION}; nothing to push."
          else
            git commit -m "chore: bump tmuxy formula to v${VERSION}"
            git push origin HEAD
          fi
