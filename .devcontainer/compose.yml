services:
  tmuxy-dev:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
      # Match container `user` to the host uid/gid so the bind-mounted /tmuxy
      # is writable. Run `HOST_UID=$(id -u) HOST_GID=$(id -g) docker compose
      # build`; defaults to the base image's 1000 when unset.
      args:
        HOST_UID: ${HOST_UID:-1000}
        HOST_GID: ${HOST_GID:-1000}
    image: tmuxy-dev
    network_mode: host
    init: true          # Proper init process to reap zombie processes
    pids_limit: 50000   # Safety buffer for process count
    stdin_open: true
    tty: true
    user: user
    working_dir: /tmuxy
    volumes:
      # Project workspace
      - ..:/tmuxy
      # Container config files
      - ../.devcontainer:/home/user/.devcontainer:ro
      # Dotfiles scripts (tmux-run, etc.)
      - ~/dotfiles/scripts:/home/user/dotfiles/scripts:ro
      # Credentials are NOT mounted from host — log in once inside the
      # container; named volumes below persist auth across restarts.
      - tmuxy-gh-config:/home/user/.config/gh
      - tmuxy-claude-config:/home/user/.claude
      - tmuxy-ssh:/home/user/.ssh
      - tmuxy-git-config:/home/user/.config/git
      # Cargo cache for faster builds
      - tmuxy-cargo-registry:/usr/local/cargo/registry
      - tmuxy-cargo-git:/usr/local/cargo/git
    environment:
      - CHROME_CDP_URL=http://localhost:9222
      - TMUX_SESSION=dev
      - CLAUDE_CONFIG_DIR=/home/user/.claude
      - GIT_CONFIG_GLOBAL=/home/user/.config/git/config
    shm_size: 1g
    mem_limit: 6g
    # Repair credential-volume ownership (root-owned/stale-UID volumes), then
    # restore ~/.claude.json (onboarding flag + oauthAccount) from the volume and
    # start its backup daemon before launching Claude — otherwise each run
    # re-prompts for login and replays the intro. See fix-credential-ownership.sh
    # and persist-claude-login.sh.
    command: bash -c "/home/user/.devcontainer/fix-credential-ownership.sh || true; /home/user/.devcontainer/persist-claude-login.sh || true; npm start && claude --dangerously-skip-permissions"

volumes:
  tmuxy-cargo-registry:
  tmuxy-cargo-git:
  tmuxy-gh-config:
  tmuxy-claude-config:
  tmuxy-ssh:
  tmuxy-git-config:
