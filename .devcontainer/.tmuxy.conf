# Tmuxy Application Configuration
# This config is used by the tmuxy web application when managing tmux sessions
# Includes sane defaults commonly used by developers
#
# NOTE: Critical settings (pane-border-status, mouse, focus-events, etc.)
# are enforced per-session by the Rust server's enforce_settings() on each
# control mode connection. They are NOT set here as globals to avoid a
# tmux 3.5a bug where global settings + control mode + new-session crashes.

# ============================================
# Tmuxy Command Aliases
# ============================================

# Pane group operations (run-shell scripts with tmux format strings)
set -s command-alias[100] 'tmuxy-pane-group-add=run-shell "bin/tmuxy/pane-group-add #{pane_id} #{pane_width} #{pane_height}"'
set -s command-alias[101] 'tmuxy-pane-group-prev=run-shell "bin/tmuxy/pane-group-prev #{pane_id}"'
set -s command-alias[102] 'tmuxy-pane-group-next=run-shell "bin/tmuxy/pane-group-next #{pane_id}"'

# Unified navigation (group → splits → tabs)
set -s command-alias[110] 'tmuxy-nav-left=run-shell "bash bin/tmuxy/nav left #{pane_id}"'
set -s command-alias[111] 'tmuxy-nav-right=run-shell "bash bin/tmuxy/nav right #{pane_id}"'
set -s command-alias[112] 'tmuxy-nav-up=run-shell "bash bin/tmuxy/nav up #{pane_id}"'
set -s command-alias[113] 'tmuxy-nav-down=run-shell "bash bin/tmuxy/nav down #{pane_id}"'
set -s command-alias[114] 'tmuxy-nav-next=run-shell "bash bin/tmuxy/nav next #{pane_id}"'
set -s command-alias[115] 'tmuxy-nav-prev=run-shell "bash bin/tmuxy/nav prev #{pane_id}"'

# ============================================
# Tmuxy Window Appearance (Tauri desktop app)
# ============================================

# Window opacity (0.0 = fully transparent, 1.0 = fully opaque)
# Only affects the Tauri desktop app, ignored by the web server.
# Default 0.8 = 80% opaque so the system blur underneath shows through.
set -g @tmuxy-opacity 0.8

# Native glass/blur effect behind the window (requires transparent window).
# Defaults to macOS's `under-window` material; safely no-ops on Linux/Windows.
# macOS: under-window, sidebar, content, header, sheet, window,
#         hud, fullscreen-ui, tooltip, popover, menu, selection
# Windows: mica, acrylic, blur, tabbed
# Set to empty (`set -gu @tmuxy-vibrancy` or comment out) to disable.
set -g @tmuxy-vibrancy under-window

# ============================================
# Terminal Settings
# ============================================

# Use 256 colors with true color support
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc,xterm-256color:Tc"

# No delay for escape sequences (important for vim/neovim)
set -sg escape-time 0

# Faster key repeat
set -g repeat-time 300

# Large scrollback history
set -g history-limit 100000

# ============================================
# Prefix Key: Ctrl+a (screen-style)
# ============================================

unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Double Ctrl+a sends literal Ctrl+a to application
bind a send-prefix

# ============================================
# Window & Pane Numbering
# ============================================

# Start windows and panes at 1 (easier keyboard access)
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# ============================================
# Vi Mode & Copy Mode
# ============================================

# Vi mode for copy mode and status line editing
setw -g mode-keys vi
set -g status-keys vi

# Vi-style copy mode bindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi V send-keys -X select-line
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi Escape send-keys -X cancel
bind-key -T copy-mode-vi q send-keys -X cancel

# Prevent auto-copy and exit on mouse drag release (keeps selection visible)
unbind -T copy-mode-vi MouseDragEnd1Pane

# Search in copy mode (vi-style)
bind-key -T copy-mode-vi / command-prompt -i -p "search down" "send -X search-forward-incremental \"%%%\""
bind-key -T copy-mode-vi ? command-prompt -i -p "search up" "send -X search-backward-incremental \"%%%\""

# ============================================
# Intuitive Split Bindings
# ============================================

# Split with - and | (opens in current directory)
bind - split-window -v -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"

# Also bind " and % to use current path
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# New window in current directory
bind c new-window -c "#{pane_current_path}"

# ============================================
# Pane Navigation (Unified: group → splits → tabs)
# ============================================

# Ctrl+hjkl - unified navigation without prefix
bind -n C-h tmuxy-nav-left
bind -n C-j tmuxy-nav-down
bind -n C-k tmuxy-nav-up
bind -n C-l tmuxy-nav-right

# Ctrl+arrow keys - unified navigation without prefix
bind -n C-Left tmuxy-nav-left
bind -n C-Right tmuxy-nav-right
bind -n C-Up tmuxy-nav-up
bind -n C-Down tmuxy-nav-down

# ============================================
# Pane Resizing
# ============================================

# Prefix + HJKL for resizing panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Prefix + arrow keys for fine-grained resizing
bind -r Left resize-pane -L 2
bind -r Down resize-pane -D 2
bind -r Up resize-pane -U 2
bind -r Right resize-pane -R 2

# ============================================
# Tab Selection (Ctrl+number, without prefix)
# ============================================

bind -n C-0 select-window -t 0
bind -n C-1 select-window -t 1
bind -n C-2 select-window -t 2
bind -n C-3 select-window -t 3
bind -n C-4 select-window -t 4
bind -n C-5 select-window -t 5
bind -n C-6 select-window -t 6
bind -n C-7 select-window -t 7
bind -n C-8 select-window -t 8
bind -n C-9 select-window -t 9

# ============================================
# Useful Shortcuts
# ============================================

# Reload config
bind r source-file ~/.config/tmuxy/tmuxy.conf \; display "Config reloaded!"

# Toggle synchronize-panes (type in all panes)
bind S setw synchronize-panes

# Add pane to group (tmuxy tabs)
bind = tmuxy-pane-group-add

# Quick pane swap
bind > swap-pane -D
bind < swap-pane -U

# Zoom pane (already default: prefix + z)
# Break pane to new window (already default: prefix + !)
# Join pane from another window
bind j choose-window "join-pane -h -s '%%'"

# ============================================
# Activity Monitoring
# ============================================

setw -g monitor-activity on
set -g visual-activity off

# ============================================
# Status Bar (Tmuxy manages the UI status)
# ============================================

set -g status on
set -g status-interval 1
set -g status-style 'bg=green,fg=black'
set -g status-left '#[bold][#S] '
set -g status-left-length 30
set -g status-right '#(whoami)@#H'
set -g status-right-length 50

# Window list hidden - managed by tmuxy UI
setw -g window-status-format ''
setw -g window-status-current-format ''

# ============================================
# Pane Appearance
# ============================================

# Pane borders (cosmetic — not the critical border-status settings)
set -g pane-border-style 'fg=#313244'
set -g pane-active-border-style 'fg=#89b4fa'

# pane-border-status, pane-border-format, mouse, focus-events,
# allow-passthrough, allow-rename, set-titles, window-size, and
# aggressive-resize are enforced per-session by the Rust server.

# ============================================
# Window Settings
# ============================================

# Automatic window rename based on running command
setw -g automatic-rename on
setw -g automatic-rename-format '#{b:pane_current_path}'
