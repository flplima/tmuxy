# Tmuxy User Configuration
#
# This file is yours. Edit it to override defaults, add custom bindings, etc.
# Tmuxy never overwrites this file once it's been created.
#
# Layout:
#   1. tmuxy.defaults.conf is sourced first (shipped with the app, refreshed
#      on every launch — never edit it directly).
#   2. Your customizations below this block override the defaults.
#   3. tmuxy.state.conf is sourced last (app-managed; theme selection, etc.).

source-file ~/.config/tmuxy/tmuxy.defaults.conf

# ===========================================================================
# Your customizations below. Examples:
#
#   set -g @tmuxy-opacity 0.85
#   set -g @tmuxy-vibrancy sidebar
#   set -g @tmuxy-active-pane-opacity 0.6
#   unbind C-a
#   set -g prefix C-Space
#   bind C-Space send-prefix
# ===========================================================================



# ===========================================================================
# App-managed state — leave the source-file line below alone.
# tmuxy writes tmuxy.state.conf when you change theme/opacity/etc. via the UI.
# `-q` makes the source silent if the file hasn't been written yet.
# ===========================================================================
source-file -q ~/.config/tmuxy/tmuxy.state.conf
