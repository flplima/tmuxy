[package]
name = "tmuxy-core"
version.workspace = true
edition.workspace = true
authors.workspace = true
description = "Core tmux interaction library for tmuxy"

[dependencies]
serde.workspace = true
serde_json.workspace = true
tokio.workspace = true
tracing.workspace = true
dirs = "6.0"
vt100 = "0.16"
regex = "1"
nix = { version = "0.29", features = ["term", "process", "signal", "fs"] }
libc = "0.2"
pty-process = { version = "0.5", features = ["async"] }
# Pure-Rust SIXEL decoder so the backend can convert palette-based DCS sequences
# into PNG bytes the frontend can render via the standard /api/images endpoint.
icy_sixel = "0.5"
# PNG encoding for sixel + kitty-RGBA outputs.
png = "0.18"
# Standards-compliant base64 decoder for kitty/iTerm2 image payloads.
base64 = "0.22"

[lints]
workspace = true

[[bin]]
name = "tmux-capture"
path = "src/bin/tmux_capture.rs"
