[package]
name = "tmuxy-wasm"
version.workspace = true
edition.workspace = true
authors.workspace = true
description = "WASM binding over tmuxy-core's sans-IO control-mode parser + state aggregator"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
# Pure core only — no native (tokio/pty/nix) transport.
tmuxy-core = { path = "../tmuxy-core", default-features = false }
wasm-bindgen = "0.2"
serde = { workspace = true }
serde-wasm-bindgen = "0.6"
base64 = "0.22"

[lints]
workspace = true
