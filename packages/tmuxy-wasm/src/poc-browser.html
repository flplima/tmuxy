<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>bash.wasm POC – @wasmer/sdk browser test</title>
  <style>
    body { font-family: monospace; background: #1a1a2e; color: #e0e0e0; margin: 0; padding: 16px; }
    h1 { color: #00d4ff; margin-bottom: 8px; font-size: 16px; }
    #log { white-space: pre; line-height: 1.5; font-size: 13px; }
    .pass { color: #4caf50; }
    .fail { color: #f44336; }
    .info { color: #aaa; }
    #summary { margin-top: 16px; padding: 8px; border: 1px solid #444; }
  </style>
</head>
<body>
<h1>bash.wasm POC – @wasmer/sdk browser tests (interactive streaming pattern)</h1>
<div id="log"></div>
<div id="summary" class="info">Running...</div>

<script type="module">
/**
 * Proof of Concept: bash.wasm in the browser via @wasmer/sdk
 *
 * Tests the interactive streaming pattern that tmuxy-wasm will use:
 * - No instance.wait() – just pipeTo() for stdout/stderr, write() for stdin
 * - Sessions stay alive indefinitely (like a real PTY)
 * - Multiple concurrent sessions supported
 *
 * Requirements:
 * - Served with COOP/COEP headers (SharedArrayBuffer)
 * - Network access to unpkg.com (loads @wasmer/sdk + wasmer_js_bg.wasm)
 *
 * Key findings:
 * - Session startup: ~0.3-1s depending on browser warmup state
 * - Write first command ≥1s after session start to avoid race with bash init
 * - X=val assignment may be silently dropped if sent too early
 * - sort/head/tail/wc available at /usr/bin; grep/awk/sed/find not found there
 *   (sharrattj/bash uses busybox-based coreutils, may be at other paths)
 * - Pipelines work via subshell: (echo a; echo b) | sort
 * - Node.js 22.22 has a SharedArrayBuffer deadlock bug – use browser only
 */

import { init, Wasmer } from "https://unpkg.com/@wasmer/sdk@0.10.0/dist/index.mjs";

const logEl = document.getElementById("log");
const summaryEl = document.getElementById("summary");
const TIMEOUT_MS = 20000;
let passed = 0, failed = 0;
const enc = new TextEncoder();
const dec = new TextDecoder();

function log(cls, msg) {
  const span = document.createElement("span");
  span.className = cls;
  span.textContent = msg + "\n";
  logEl.appendChild(span);
}

async function test(name, fn) {
  log("info", `[TEST] ${name}...`);
  try {
    const result = await Promise.race([
      fn(),
      new Promise((_, rej) => setTimeout(() => rej(new Error(`timeout after ${TIMEOUT_MS}ms`)), TIMEOUT_MS)),
    ]);
    log("pass", `  ✓ ${result ?? "ok"}`);
    passed++;
    window.__testResults = window.__testResults || [];
    window.__testResults.push({ name, pass: true, result });
    return result;
  } catch (e) {
    log("fail", `  ✗ ${e.message}`);
    failed++;
    window.__testResults = window.__testResults || [];
    window.__testResults.push({ name, pass: false, error: e.message });
    return null;
  }
}

/**
 * Creates a live bash session using the interactive streaming pattern.
 * This is the pattern tmuxy-wasm uses – no instance.wait(), just streams.
 *
 * IMPORTANT: bash takes ~300-1000ms to initialize. Send first command
 * at least 1s after session creation to avoid race conditions.
 */
async function createSession(bash) {
  const instance = await bash.entrypoint.run();

  const outputBuf = [];
  const outputListeners = [];

  instance.stdout.pipeTo(
    new WritableStream({
      write(chunk) {
        const text = dec.decode(chunk);
        outputBuf.push(text);
        outputListeners.forEach(fn => fn(text));
      },
    }),
  );

  instance.stderr?.pipeTo(
    new WritableStream({
      write(chunk) {
        outputBuf.push("[stderr] " + dec.decode(chunk));
      },
    }),
  );

  const stdinWriter = instance.stdin?.getWriter();

  return {
    write(text) { return stdinWriter?.write(enc.encode(text)); },
    waitForOutput(marker, timeoutMs = TIMEOUT_MS) {
      return new Promise((resolve, reject) => {
        if (outputBuf.join("").includes(marker)) return resolve(outputBuf.join(""));
        const timer = setTimeout(() => {
          reject(new Error(`waitForOutput(${JSON.stringify(marker)}) timed out`));
        }, timeoutMs);
        const listener = () => {
          if (outputBuf.join("").includes(marker)) {
            clearTimeout(timer);
            outputListeners.splice(outputListeners.indexOf(listener), 1);
            resolve(outputBuf.join(""));
          }
        };
        outputListeners.push(listener);
      });
    },
    getOutput() { return outputBuf.join(""); },
    instance,
  };
}

async function main() {
  try {
    log("info", "Initializing @wasmer/sdk...");
    await init();
    log("pass", "  ✓ SDK initialized");

    log("info", "Loading sharrattj/bash from registry...");
    const bash = await Wasmer.fromRegistry("sharrattj/bash");
    log("pass", `  ✓ loaded (${Object.keys(bash.commands).length} commands, entrypoint: ${bash.entrypoint ? "yes" : "no"})`);

    // ── 1. Session starts ──────────────────────────────────────────────────
    await test("session starts (stdin+stdout available)", async () => {
      const session = await createSession(bash);
      if (!session.instance.stdin) throw new Error("no stdin");
      return "stdin+stdout connected";
    });

    // ── 2. Basic echo ──────────────────────────────────────────────────────
    await test("write echo → read output", async () => {
      const session = await createSession(bash);
      await new Promise(r => setTimeout(r, 1000));
      const MARK = "HELLO_" + Date.now();
      await session.write(`echo ${MARK}\n`);
      await session.waitForOutput(MARK);
      return `output contains ${MARK}`;
    });

    // ── 3. Multiple sequential writes ──────────────────────────────────────
    await test("multiple sequential writes", async () => {
      const session = await createSession(bash);
      await new Promise(r => setTimeout(r, 1000));
      const M1 = "CMD1_" + Date.now();
      const M2 = "CMD2_" + Date.now();
      await session.write(`echo ${M1}\n`);
      await session.waitForOutput(M1);
      await session.write(`echo ${M2}\n`);
      await session.waitForOutput(M2);
      return `${M1} and ${M2} received`;
    });

    // ── 4. Command chaining + special var ──────────────────────────────────
    await test("command chaining: false;echo $? / true;echo $?", async () => {
      const session = await createSession(bash);
      await new Promise(r => setTimeout(r, 1000));
      await session.write("false; echo EXITFALSE:$?\n");
      await session.waitForOutput("EXITFALSE:1");
      await session.write("true; echo EXITTRUE:$?\n");
      await session.waitForOutput("EXITTRUE:0");
      return "false=$?=1, true=$?=0";
    });

    // ── 5. File write + read ───────────────────────────────────────────────
    await test("write file and read it back", async () => {
      const session = await createSession(bash);
      await new Promise(r => setTimeout(r, 1000));
      const CONTENT = "FILECONTENT_" + Date.now();
      await session.write(`echo '${CONTENT}' > /tmp/poc-test.txt\n`);
      await session.write(`cat /tmp/poc-test.txt\n`);
      await session.waitForOutput(CONTENT);
      return `file round-trip: ${CONTENT}`;
    });

    // ── 6. Pipeline via subshell ───────────────────────────────────────────
    await test("pipeline: (echo c; echo b; echo a) | sort", async () => {
      const session = await createSession(bash);
      await new Promise(r => setTimeout(r, 1000));
      await session.write("(echo c; echo b; echo a) | sort; echo PIPE_DONE\n");
      await session.waitForOutput("PIPE_DONE");
      return "sorted pipeline works";
    });

    // ── 7. Available tools ─────────────────────────────────────────────────
    await test("tools: sort head tail wc find at /usr/bin", async () => {
      const session = await createSession(bash);
      await new Promise(r => setTimeout(r, 1000));
      const tools = ["sort", "head", "tail", "wc"];
      for (const t of tools) await session.write(`ls /usr/bin/${t} && echo HAS_${t}\n`);
      await session.waitForOutput(`HAS_${tools[tools.length - 1]}`, 15000);
      const out = session.getOutput();
      const found = tools.filter(t => out.includes(`HAS_${t}`));
      const missing = tools.filter(t => !out.includes(`HAS_${t}`));
      return `found=[${found.join(",")}] missing=[${missing.join(",")}]`;
    });

    // ── 8. Exit code ───────────────────────────────────────────────────────
    await test("exit code: false → $?=1, true → $?=0", async () => {
      const session = await createSession(bash);
      await new Promise(r => setTimeout(r, 1000));
      await session.write("false; echo EX_F:$?\n");
      await session.waitForOutput("EX_F:1");
      await session.write("true; echo EX_T:$?\n");
      await session.waitForOutput("EX_T:0");
      return "false=1, true=0";
    });

    // ── 9. Interactive stdin (read) ────────────────────────────────────────
    await test("interactive stdin: read → echo $VAR", async () => {
      const session = await createSession(bash);
      await new Promise(r => setTimeout(r, 1000));
      const TOKEN = "INPUTVAL_" + Date.now();
      await session.write("read MYINPUT && echo READ:$MYINPUT\n");
      await new Promise(r => setTimeout(r, 300));
      await session.write(`${TOKEN}\n`);
      await session.waitForOutput(`READ:${TOKEN}`);
      return `read: ${TOKEN}`;
    });

    // ── 10. Streaming output (sleep between echoes) ────────────────────────
    await test("streaming: sleep between echoes", async () => {
      const session = await createSession(bash);
      await new Promise(r => setTimeout(r, 1000));
      await session.write("echo STREAM1; sleep 0.1; echo STREAM2; sleep 0.1; echo STREAM3\n");
      await session.waitForOutput("STREAM3");
      const out = session.getOutput();
      if (!["STREAM1", "STREAM2", "STREAM3"].every(c => out.includes(c)))
        throw new Error("missing chunks");
      return "all 3 chunks received in order";
    });

    // ── Summary ───────────────────────────────────────────────────────────
    const summary = `Results: ${passed} passed, ${failed} failed out of ${passed + failed} tests`;
    summaryEl.textContent = summary;
    summaryEl.className = failed > 0 ? "fail" : "pass";
    log(failed > 0 ? "fail" : "pass", "\n" + "─".repeat(50) + "\n" + summary);
  } catch (e) {
    log("fail", `\nFATAL: ${e.message}`);
    summaryEl.textContent = "FATAL: " + e.message;
    summaryEl.className = "fail";
  } finally {
    window.__pocDone = true;
    window.__pocPassed = passed;
    window.__pocFailed = failed;
  }
}

main();
</script>
</body>
</html>
